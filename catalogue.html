<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogue | LuxJewel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>
</head>
<body>

    <div class="scroll-progress-container">
        <div class="scroll-progress-bar"></div>
    </div>
    
    <div class="custom-cursor"></div>
    <nav>
        <div class="logo">
            <a href="index.html"><img src="assets/logo.png" alt="LuxJewel"></a>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="catalogue.html" class="active">Catalogue</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <header style="padding-top: 120px; text-align: center; margin-bottom: 40px;">
            <div class="section-title">
                <h2>Our Catalogue</h2>
                <p style="color: var(--text-gray); font-size: 0.8rem; letter-spacing: 2px;">BROWSE BY CATEGORY</p>
                <div class="divider"></div>
            </div>
        </header>

        <section id="catalogue-grid">
            <div class="cat-grid">
                <a href="products.html" class="cat-item reveal-item">
                    <img src="https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=600&auto=format&fit=crop" alt="Rings">
                    <div class="cat-overlay">
                        <h3>Rings</h3>
                    </div>
                </a>
                <a href="products.html" class="cat-item reveal-item">
                    <img src="https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?q=80&w=600&auto=format&fit=crop" alt="Necklaces">
                    <div class="cat-overlay">
                        <h3>Necklaces</h3>
                    </div>
                </a>
                <a href="products.html" class="cat-item reveal-item">
                    <img src="https://images.unsplash.com/photo-1617041352433-87f54c9da4bc?q=80&w=600&auto=format&fit=crop" alt="Watches">
                    <div class="cat-overlay">
                        <h3>Watches</h3>
                    </div>
                </a>
                <a href="products.html" class="cat-item reveal-item">
                    <img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=600&auto=format&fit=crop" alt="Earrings">
                    <div class="cat-overlay">
                        <h3>Earrings</h3>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-logo">
            <img src="assets/logo.png" alt="LuxJewel">
        </div>
        <div class="footer-nav">
            <a href="index.html">Home</a>
            <a href="products.html">Products</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="contact.html">Contact</a>
        </div>
        <p class="copyright">&copy; 2026 LuxJewel. Professional Jewelry Handcrafted with Love.</p>
        <p class="developer-credit" style="font-size: 0.6rem; color: #555; margin-top: 10px; letter-spacing: 1px;">Designed and developed by Vijay Kumar Theegala</p>
    </footer>

    <div class="floating-wa" onclick="buyNow('Inquiry')">
        <div class="wa-badge">Hi!</div>
        <i class="fab fa-whatsapp"></i>
    </div>

    <script src="main.js"></script>
</body>
</html>
